<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor de Marcas Oficiales (Pixel-Perfect) - TBOI</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent: #b71c1c;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            margin: 0;
        }

        h1 {
            margin: 0 0 20px 0;
            font-weight: 400;
            text-align: center;
            color: #fff;
        }

        .container {
            display: flex;
            gap: 30px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
            justify-content: center;
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            image-rendering: pixelated;
            width: 160px;
            height: 160px;
            background: #151515;
            border: 2px dashed #444;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .preview-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 250px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #aaa;
            font-weight: bold;
        }

        select, input[type="number"] {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #121212;
            color: white;
            font-size: 15px;
            outline: none;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--accent);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-row input {
            width: 80px;
            text-align: center;
        }

        .input-row span {
            color: #888;
            font-size: 14px;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn:hover:not(:disabled) {
            background-color: #d32f2f;
        }

        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #444;
            color: #777;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <h1>Extractor de Marcas Oficiales (Pixel-Perfect)</h1>

    <div class="container">
        <div class="preview-section">
            <canvas id="preview-canvas" width="16" height="16"></canvas>
            <span class="preview-label">Vista Previa (16x16)</span>
        </div>

        <div class="controls-section">
            <div class="control-group">
                <label for="select-mark">Marca a extraer:</label>
                <select id="select-mark">
                    <option value="0">Heart (Mom's Heart)</option>
                    <option value="1">Isaac</option>
                    <option value="2">??? (Blue Baby)</option>
                    <option value="3">Satan</option>
                    <option value="4">The Lamb</option>
                    <option value="5">Mega Satan</option>
                    <option value="6">Boss Rush</option>
                    <option value="7">Hush</option>
                    <option value="8">Mother</option>
                    <option value="9">The Beast</option>
                    <option value="10">Ultra Greed</option>
                </select>
            </div>

            <div class="control-group">
                <label for="select-state">Modo / Dificultad:</label>
                <select id="select-state">
                    <option value="0">Normal</option>
                    <option value="1">Hard</option>
                    <option value="2">Online Normal</option>
                    <option value="3">Online Hard</option>
                </select>
            </div>

            <div class="control-group">
                <label for="input-scale">Multiplicador de Ampliación Personalizado:</label>
                <div class="input-row">
                    <input type="number" id="input-scale" value="4" min="1" max="200">
                </div>
            </div>

            <button class="btn" id="export-btn" disabled>📥 Exportar en Alta Calidad</button>
        </div>
    </div>

        // Coordenadas XCrop exactas obtenidas del archivo .anm2
        const MARKS = [
            { id: "heart", name: "Heart", cx: 64 },
            { id: "isaac", name: "Isaac", cx: 32 },
            { id: "bluebaby", name: "???", cx: 0 },
            { id: "satan", name: "Satan", cx: 48 },
            { id: "lamb", name: "The Lamb", cx: 16 },
            { id: "megasatan", name: "Mega Satan", cx: 112 },
            { id: "bossrush", name: "Boss Rush", cx: 80 },
            { id: "hush", name: "Hush", cx: 128 },
            { id: "mother", name: "Mother", cx: 160 },
            { id: "beast", name: "The Beast", cx: 176 },
            { id: "greed", name: "Ultra Greed", cx: 144 }
        ];

        // Coordenadas YCrop exactas obtenidas del archivo .anm2
        const STATES = [
            { id: "normal", name: "Normal", yCrop: 112 },
            { id: "hard", name: "Hard", yCrop: 96 },
            { id: "online_normal", name: "Online Normal", yCrop: 320 },
            { id: "online_hard", name: "Online Hard", yCrop: 336 }
        ];

        let spritesheet = new Image();
        const previewCanvas = document.getElementById('preview-canvas');
        const previewCtx = previewCanvas.getContext('2d');
        const selectMark = document.getElementById('select-mark');
        const selectState = document.getElementById('select-state');
        const inputScale = document.getElementById('input-scale');
        const exportBtn = document.getElementById('export-btn');
        const resText = document.getElementById('resolution-preview');

        window.onload = function () {
            spritesheet.onload = function () {
                exportBtn.disabled = false;
                updatePreview();
            };
            spritesheet.src = IMAGE_BASE64;
        };

        selectMark.addEventListener('change', updatePreview);
        selectState.addEventListener('change', updatePreview);
        
        inputScale.addEventListener('input', () => {
            const scale = Math.max(1, parseInt(inputScale.value) || 1);
            resText.innerText = `Resolución final: ${16 * scale}x${16 * scale} px`;
        });

        function updatePreview() {
            if (!spritesheet.complete) return;

            const mark = MARKS[selectMark.value];
            const state = STATES[selectState.value];

            previewCtx.clearRect(0, 0, 16, 16);
            // Realiza el recorte con las medidas exactas del .anm2
            previewCtx.drawImage(spritesheet, mark.cx, state.yCrop, 16, 16, 0, 0, 16, 16);
        }

        exportBtn.addEventListener('click', function () {
            if (!spritesheet.complete) return;

            const scale = Math.max(1, parseInt(inputScale.value) || 1);
            const mark = MARKS[selectMark.value];
            const state = STATES[selectState.value];

            // Crear un lienzo dinámico según la escala ingresada por el usuario
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 16 * scale;
            tempCanvas.height = 16 * scale;
            const tCtx = tempCanvas.getContext('2d');

            // Mantener bordes Pixel-Art nítidos sin importar el tamaño de ampliación
            tCtx.imageSmoothingEnabled = false;

            // Renderizar la imagen estirándola según los pixeles exactos de la vista previa
            tCtx.drawImage(
                previewCanvas,
                0, 0, 16, 16,
                0, 0, tempCanvas.width, tempCanvas.height
            );

            // Descarga automática
            const link = document.createElement('a');
            link.download = `marca_${mark.id}_${state.id}_x${scale}.png`;
            link.href = tempCanvas.toDataURL("image/png");
            link.click();
        });
    </script>
